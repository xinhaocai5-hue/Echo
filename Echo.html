    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              neutral: { 850: '#1f1f1f', 900: '#171717', 925: '#121212', 950: '#0a0a0a' },
              accent: { DEFAULT: '#3b82f6', glow: 'rgba(59, 130, 246, 0.5)' }
            },
            fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'] },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out forwards',
              'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-up-bar': 'slideUpBar 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'pop': 'pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)',
              'spin-slow': 'spin 2s linear infinite',
              'text-reveal': 'textReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
              slideUpBar: { '0%': { opacity: '0', transform: 'translate(-50%, 20px)' }, '100%': { opacity: '1', transform: 'translate(-50%, 0)' } },
              pop: { '0%': { transform: 'scale(0.8)' }, '50%': { transform: 'scale(1.1)' }, '100%': { transform: 'scale(1)' } },
              textReveal: { '0%': { transform: 'translateY(40px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
            }
          }
        }
      }
      
      // 全局标签数据存储（避免localStorage超出配额）
      window.GLOBAL_TAG_DATA = [];
      
      // 从 Framer Motion 获取动画组件
      const { motion, AnimatePresence } = window.Motion || {};

    <style>
      /* ----- 物理新拟态核心变量 (适配亮/暗模式) ----- */
      :root {
        --bg-primary: #e0e5ec;
        --bg-secondary: #f0f5fa;
        --text-primary: #2d3e50;
        --text-secondary: #6b7a8d;
        --shadow-dark: #b8bcc2;
        --shadow-light: #ffffff;
        --card-bg: #e0e5ec;
        --inset-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        --raised-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
        --floating-shadow: 20px 20px 40px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
        --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
      }
      .dark {
        --bg-primary: #1a1e24;
        --bg-secondary: #0f1217;
        --text-primary: #e2e8f0;
        --text-secondary: #a0aec0;
        --shadow-dark: #0a0c10;
        --shadow-light: #2a2f38;
        --card-bg: #1a1e24;
        --inset-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        --raised-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
        --floating-shadow: 15px 15px 30px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 0.3s, color 0.3s;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
      }

      /* 通用新拟态类 */
      .neumorph-pressed {
        background: var(--bg-primary);
        box-shadow: var(--inset-shadow);
        border-radius: 1.25rem;
        transition: all 0.2s;
      }
      .neumorph-raised {
        background: var(--bg-primary);
        box-shadow: var(--raised-shadow);
        border-radius: 0.75rem;
        transition: all 0.2s;
      }
      .neumorph-raised:active {
        box-shadow: var(--inset-shadow);
        transform: scale(0.98);
      }
      .neumorph-input {
        background: var(--bg-primary);
        box-shadow: var(--inset-shadow);
        border: none;
        border-radius: 0.75rem;
        transition: all 0.2s;
      }
      .neumorph-input:focus {
        outline: 2px solid #3b82f6;
        outline-offset: 2px;
      }

      /* ===== 3D 悬浮卡片系统 (来自优秀UI动画) ===== */
      .perspective-box {
        perspective: 1500px;
      }

      .card-3d {
        position: relative;
        background: var(--card-bg);
        /* 增强阴影：下方阴影更明显，营造悬浮感 */
        box-shadow: 
          0 10px 30px var(--shadow-dark),      /* 下方主要阴影 */
          0 20px 40px -10px var(--shadow-dark), /* 下方扩散阴影 */
          -8px -8px 16px var(--shadow-light);   /* 上方高光 */
        border-radius: 1rem;
        transition: transform 0.1s ease-out, box-shadow 0.3s ease;
        transform-style: preserve-3d;
        will-change: transform;
        overflow: hidden;
      }

      /* 悬停时的阴影变化：更明显的悬浮效果 */
      .card-3d.floating {
        box-shadow: 
          0 20px 50px var(--shadow-dark),      /* 增强下方阴影 */
          0 30px 60px -15px var(--shadow-dark), /* 更强的扩散阴影 */
          -10px -10px 20px var(--shadow-light); /* 增强上方高光 */
        transform: translateY(-5px); /* 轻微上浮 */
      }

      /* 光泽层 - 跟随鼠标 */
      .glare {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.9) 0%, transparent 60%);
        opacity: 0;
        transition: opacity 0.3s;
        mix-blend-mode: overlay;
        border-radius: inherit;
        z-index: 10;
      }
      .card-3d:hover .glare {
        opacity: 0.5;
      }

      /* ===== 景深后退系统 ===== */
      .stage-back {
        transition: transform 0.6s var(--ease-smooth), opacity 0.6s;
      }
      .stage-back.pushed {
        transform: scale(0.9);
        opacity: 0.4;
        pointer-events: none;
      }

      /* ===== 浮动详情页 (弹性动画) ===== */
      .detail-floating {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.9);
        opacity: 0;
        pointer-events: none;
        z-index: 100;
        transition: transform 0.6s var(--ease-spring), opacity 0.4s ease;
      }
      .detail-floating.active {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
        pointer-events: auto;
      }

      .detail-content {
        width: 85vw;
        max-width: 1100px;
        height: 80vh;
        background: var(--bg-primary);
        /* 超级阴影 */
        box-shadow: 30px 30px 60px var(--shadow-dark), -30px -30px 60px var(--shadow-light);
        border-radius: 2rem;
        overflow: hidden;
        display: flex;
        position: relative;
      }

      /* 关闭按钮 - 新拟态 */
      .close-btn {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        width: 2.5rem;
        height: 2.5rem;
        background: var(--bg-primary);
        box-shadow: var(--raised-shadow);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 200;
        transition: all 0.2s;
      }
      .close-btn:active {
        box-shadow: var(--inset-shadow);
        transform: scale(0.95);
      }

      /* ===== 文字逐字动画 ===== */
      @keyframes textReveal {
        0% { transform: translateY(40px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }

      .char-reveal {
        display: inline-block;
        opacity: 0;
        animation: textReveal 0.6s var(--ease-smooth) forwards;
      }

      /* 自定义滚动条 */
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(100, 100, 100, 0.3); border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(100, 100, 100, 0.5); }
      
      /* 黑夜模式下的滚动条 */
      @media (prefers-color-scheme: dark) {
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(80, 80, 80, 0.5); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(100, 100, 100, 0.7); }
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(80, 80, 80, 0.5); }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(100, 100, 100, 0.7); }

      /* Modal 样式优化 - 弹性动画 */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        transition: opacity 0.3s;
      }

      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        transition: opacity 0.3s;
      }

      .modal-content {
        position: relative;
        width: 100%;
        max-width: 32rem;
        background: var(--bg-primary);
        box-shadow: var(--floating-shadow);
        border-radius: 1.5rem;
        transform: scale(0.9) translateY(20px);
        opacity: 0;
        transition: transform 0.4s var(--ease-spring), opacity 0.3s;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
      }

      .modal-overlay.active .modal-content {
        transform: scale(1) translateY(0);
        opacity: 1;
      }

      /* 底部操作栏 - 弹性动画 */
      .action-bar {
        position: absolute;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--bg-primary);
        box-shadow: var(--floating-shadow);
        border-radius: 1rem;
        padding: 0.75rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        opacity: 0;
        pointer-events: none;
        transition: transform 0.5s var(--ease-spring), opacity 0.3s;
        z-index: 40;
      }

      .action-bar.active {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      input[type=range] { -webkit-appearance: none; background: transparent; }
      input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -4px; }
      input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(128,128,128,0.3); border-radius: 2px; }

      #loading-screen { position: fixed; inset: 0; background: #0a0a0a; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 9999; font-family: sans-serif; transition: opacity 0.5s; flex-direction: column; gap: 20px;}
      #loading-screen .echo-spinner { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: echo-spin 0.8s linear infinite; }
      @keyframes echo-spin { to { transform: rotate(360deg); } }
      #loading-screen .echo-title { font-size: 22px; font-weight: 600; letter-spacing: 2px; opacity: 0.9; }
      #loading-screen .echo-sub { font-size: 13px; color: #666; }
      #error-log { color: #ef4444; font-family: monospace; font-size: 12px; max-width: 80%; word-break: break-all; text-align: center; display: none; }
/* Modal 从按钮位置展开动画 */
      .modal-expand-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .modal-expand-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(12px);
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .modal-expand-overlay.active .modal-expand-backdrop {
        opacity: 1;
      }

      .modal-expand-content {
        position: relative;
        width: 100%;
        max-width: 32rem;
        background: var(--bg-primary);
        border-radius: 1.5rem;
        box-shadow: var(--floating-shadow);
        /* 从按钮位置展开的动画 */
        transform: scale(0) translate(var(--origin-x, 0), var(--origin-y, 0));
        transform-origin: var(--click-x, 50%) var(--click-y, 50%);
        opacity: 0;
        transition: transform 0.5s var(--ease-spring), opacity 0.3s ease;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .modal-expand-overlay.active .modal-expand-content {
        transform: scale(1) translate(0, 0);
        opacity: 1;
      }

      /* 全局景深后退 - 应用于整个主容器 */
      .main-container {
        transition: transform 0.6s var(--ease-smooth), opacity 0.6s, filter 0.6s;
        transform-origin: center center;
      }

      .main-container.pushed-back {
        transform: scale(0.85) translateY(-20px);
        opacity: 0.5;
        filter: blur(2px);
        pointer-events: none;
      }

      /* ===== 从按钮位置展开的动画系统（修复版） ===== */

      /* 展开动画容器 - 独立于主容器，不受缩放影响 */
      .expand-overlay,
      .detail-expand-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
        /* 关键：确保不受父容器transform/filter影响 */
        transform: none !important;
        filter: none !important;
      }

      .expand-overlay.active,
      .detail-expand-overlay.active {
        pointer-events: auto;
        opacity: 1;
      }

      /* 展开内容 - 放大渐显效果 */
      .expand-content {
        position: relative;
        width: 90vw;
        max-width: 500px;
        max-height: 85vh;
        background: var(--bg-primary);
        border-radius: 1.5rem;
        box-shadow: var(--floating-shadow);
        overflow: hidden;
        display: flex;
        flex-direction: column;

        /* 初始状态：缩小并透明 */
        transform: scale(0.5);
        opacity: 0;

        /* 放大渐显动画 - 弹性缓动 */
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                    opacity 0.4s ease;
      }

      .expand-overlay.active .expand-content {
        transform: scale(1);
        opacity: 1;
      }

      /* 详情页展开内容 */
      .detail-expand-content {
        position: relative;
        width: 85vw;
        max-width: 1100px;
        height: 80vh;
        background: var(--bg-primary);
        border-radius: 2rem;
        box-shadow: 30px 30px 60px var(--shadow-dark), -30px -30px 60px var(--shadow-light);
        overflow: hidden;
        display: flex;

        /* 初始状态：缩小并透明 */
        transform: scale(0.7);
        opacity: 0;

        /* 放大渐显动画 */
        transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), 
                    opacity 0.4s ease;
      }

      .detail-expand-overlay.active .detail-expand-content {
        transform: scale(1);
        opacity: 1;
      }

/* 关闭按钮 */
      .expand-close-btn {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 2.5rem;
        height: 2.5rem;
        background: var(--bg-primary);
        box-shadow: var(--raised-shadow);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 200;
        transition: all 0.2s;
        border: none;
      }

      .expand-close-btn:active {
        box-shadow: var(--inset-shadow);
        transform: scale(0.95);
      }

      /* 确保内容在clip-path动画期间可交互 */
      .expand-content > *,
      .detail-expand-content > * {
        opacity: 0;
        transition: opacity 0.3s ease 0.3s;
      }

      .expand-overlay.active .expand-content > *,
      .detail-expand-overlay.active .detail-expand-content > * {
        opacity: 1;
      }

      /* ===== 全屏模态框样式（快捷生图） ===== */
      .fullscreen-modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
        transform: none !important;
        filter: none !important;
      }

      .fullscreen-modal-overlay.active {
        pointer-events: auto;
        opacity: 1;
      }

      .fullscreen-modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .fullscreen-modal-overlay.active .fullscreen-modal-backdrop {
        opacity: 1;
      }

      .fullscreen-modal-content {
        position: relative;
        width: 95vw;
        height: 95vh;
        max-width: 1600px;
        background: var(--bg-primary);
        border-radius: 1.5rem;
        box-shadow: 30px 30px 60px var(--shadow-dark), -30px -30px 60px var(--shadow-light);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transform: scale(0.8);
        opacity: 0;
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                    opacity 0.4s ease;
      }

      .fullscreen-modal-overlay.active .fullscreen-modal-content {
        transform: scale(1);
        opacity: 1;
      }

      .fullscreen-modal-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 2.5rem;
        height: 2.5rem;
        background: var(--bg-primary);
        box-shadow: var(--raised-shadow);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 200;
        transition: all 0.2s;
        border: none;
      }

      .fullscreen-modal-close:hover {
        transform: rotate(90deg) scale(1.1);
        box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
      }

      .fullscreen-modal-close:active {
        box-shadow: var(--inset-shadow);
        transform: rotate(90deg) scale(0.9);
      }

      /* 快捷生图界面布局 */
      .quick-gen-container {
        display: flex;
        height: 100%;
        overflow: hidden;
      }

      .quick-gen-sidebar {
        width: 380px;
        min-width: 200px;
        max-width: 800px;
        flex-shrink: 0;
        border-right: 1px solid rgba(128, 128, 128, 0.2);
        overflow-y: auto;
        padding: 1.5rem;
      }

      .quick-gen-resizer {
        width: 6px;
        background: transparent;
        cursor: col-resize;
        flex-shrink: 0;
        transition: background 0.2s;
      }

      .quick-gen-resizer:hover {
        background: rgba(59, 130, 246, 0.3);
      }

      .quick-gen-resizer.dragging {
        background: rgba(59, 130, 246, 0.5);
      }

      .quick-gen-preview {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
        overflow-y: auto;
        min-width: 300px;
      }

      /* 可折叠区域样式 */
      .collapsible-section {
        border-radius: 0.75rem;
        overflow: visible;
        margin-bottom: 1rem;
      }

      .collapsible-section.neumorph-input {
        border: none;
        background: var(--bg-primary);
        box-shadow: var(--inset-shadow);
      }

      .collapsible-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
        background: transparent;
        cursor: pointer;
        transition: background 0.2s;
        border-radius: 0.75rem 0.75rem 0 0;
      }

      .collapsible-header:hover {
        background: rgba(128, 128, 128, 0.05);
      }

      .collapsible-content {
        padding: 1rem;
        border-top: 1px solid rgba(128, 128, 128, 0.2);
        overflow: visible;
      }

      .collapsible-section.neumorph-input .collapsible-content {
        border-top: none;
      }

      /* 进度条样式 */
      .gen-progress-container {
        width: 100%;
        height: 8px;
        background: rgba(128, 128, 128, 0.2);
        border-radius: 4px;
        overflow: hidden;
        margin-top: 0.5rem;
      }

      .gen-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        border-radius: 4px;
        transition: width 0.3s ease;
      }

      /* 错误提示样式 */

        window.onerror = function(msg, url, line, col, error) {

                    const loader = document.getElementById('loading-screen');
                    if(loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.remove(), 400);
                    }
                }
            }, 300);
            
            // 初始化物理反馈系统
            initPhysicsFeedback();
        }
        
        // ===== 物理反馈系统 =====
        function initPhysicsFeedback() {
            // 波纹效果 - 为所有按钮添加点击波纹
            document.addEventListener('click', function(e) {
                const btn = e.target.closest('button, .sidebar-btn, .icon-btn, .card-action-btn, .tab-btn, [role="button"]');
                if (!btn) return;
                
                createRipple(e, btn);
            });
            
            // 磁吸悬停效果 - 按钮轻微跟随鼠标
            document.addEventListener('mousemove', function(e) {
                const magneticBtns = document.querySelectorAll('.magnetic-btn, .neumorph-raised.btn-physics');
                magneticBtns.forEach(btn => {
                    const rect = btn.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    
                    if (Math.abs(x) < rect.width * 0.7 && Math.abs(y) < rect.height * 0.7) {
                        const strength = 0.12;
                        if (!btn.dataset.magneticActive) {
                            btn.dataset.magneticActive = 'true';
                        }
                        btn.style.setProperty('--magnetic-x', `${x * strength}px`);
                        btn.style.setProperty('--magnetic-y', `${y * strength}px`);
                    }
                });
            });
            
            document.addEventListener('mouseleave', function(e) {
                if (e.target.matches && e.target.matches('.magnetic-btn, .neumorph-raised.btn-physics')) {
                    delete e.target.dataset.magneticActive;
                    e.target.style.removeProperty('--magnetic-x');
                    e.target.style.removeProperty('--magnetic-y');
                }
            }, true);
            
            document.addEventListener('mouseup', function(e) {
                const btn = e.target.closest('button.btn-physics');
                if (btn) {
                    btn.classList.add('btn-released');
                    setTimeout(() => btn.classList.remove('btn-released'), 300);
                }
            });
        }
        
        function createRipple(event, element) {
            const computedStyle = getComputedStyle(element);
            const originalOverflow = computedStyle.overflow;
            const originalPosition = computedStyle.position;
            
            if (originalPosition === 'static') {
                element.style.position = 'relative';
            }
            if (originalOverflow !== 'hidden' && originalOverflow !== 'clip') {
                element.style.overflow = 'hidden';
            }
            
            const rect = element.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height) * 2.5;
            const x = event.clientX - rect.left - size / 2;
            const y = event.clientY - rect.top - size / 2;
            
            const ripple = document.createElement('span');
            ripple.className = 'ripple-wave';
            ripple.style.cssText = `width: ${size}px; height: ${size}px; left: ${x}px; top: ${y}px;`;
            
            element.appendChild(ripple);
            
            ripple.addEventListener('animationend', () => {
                ripple.remove();
                if (originalOverflow !== 'hidden' && originalOverflow !== 'clip') {
                    element.style.overflow = originalOverflow;
                }
            });
        }
        
        function triggerGlow(element) {
            element.classList.add('btn-glowing');
            setTimeout(() => element.classList.remove('btn-glowing'), 400);
        }
    </script>

  const compressImage = async (dataUrl, targetSizeKB) => {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = async () => {
        const targetBytes = targetSizeKB * 1024;
        const maxDimension = 2048;
        let {
          width,
          height
        } = img;
        if (width > maxDimension || height > maxDimension) {
          if (width > height) {
            height = height / width * maxDimension;
            width = maxDimension;
          } else {
            width = width / height * maxDimension;
            height = maxDimension;
          }
        }
        const tryQuality = (canvas, quality) => {
          return new Promise(res => {
            canvas.toBlob(async blob => {
              const reader = new FileReader();
              reader.onloadend = () => res({
                base64: reader.result,
                size: blob.size
              });
              reader.readAsDataURL(blob);
            }, 'image/webp', quality);
          });
        };
        const findBestForSize = async (canvas, w, h) => {
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          let lowQ = 0.1,
            highQ = 0.9;
          let best = {
            base64: null,
            size: Infinity
          };
          let result = await tryQuality(canvas, highQ);
          if (result.size <= targetBytes) {
            return result;
          }
          for (let i = 0; i < 10; i++) {
            const midQ = (lowQ + highQ) / 2;
            result = await tryQuality(canvas, midQ);
            if (result.size <= targetBytes) {
              best = result;
              lowQ = midQ;
            } else {
              highQ = midQ;
            }
          }
          if (best.size === Infinity) {
            best = await tryQuality(canvas, 0.1);
          }
          return best;
        };
        let canvas = document.createElement('canvas');
        let scale = 1.0;
        let bestOverall = {
          base64: null,
          size: Infinity
        };
        while (scale >= 0.1) {
          const w = Math.max(1, Math.floor(width * scale));
          const h = Math.max(1, Math.floor(height * scale));
          const result = await findBestForSize(canvas, w, h);
          if (result.size <= targetBytes) {
            resolve(result.base64);
            return;
          } else {
            if (result.size < bestOverall.size) {
              bestOverall = result;
            }
          }
          scale *= 0.7;
        }
        resolve(bestOverall.base64);
      };
      img.src = dataUrl;
    });
